name: deploy-production

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to deploy (e.g. v0.7.0)"
                required: true
                type: string

concurrency:
    group: vercel-production
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            VTOKEN: ${{ secrets.VERCEL_TOKEN }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.tag || github.ref }}

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm exec vercel pull --yes --environment=production --token=$VTOKEN
            - run: pnpm exec vercel build --prod --token=$VTOKEN
            - run: pnpm exec vercel deploy --prebuilt --prod --token=$VTOKEN
